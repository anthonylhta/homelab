name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Type-check, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  build:
    name: Build app image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  e2e:
    name: Smoke-test the stack
    runs-on: ubuntu-latest
    needs: [check, build]
    steps:
      - uses: actions/checkout@v4

      - name: Start the stack
        run: docker compose up -d --build

      - name: Wait for the app to be live
        run: |
          for i in $(seq 1 30); do
            curl -fsS localhost:3000/healthz && break
            echo "waiting for app ($i/30)"; sleep 2
          done
          curl -fsS localhost:3000/healthz

      - name: App exposes Prometheus metrics
        run: curl -fsS localhost:3000/metrics | grep -q 'http_requests_total'

      - name: App is connected to Postgres
        run: |
          for i in $(seq 1 30); do
            curl -fsS localhost:3000/ | grep -q '"connected":true' && break
            echo "waiting for db connection ($i/30)"; sleep 2
          done
          curl -fsS localhost:3000/ | grep -q '"connected":true'

      - name: Prometheus is scraping the app
        run: |
          q='localhost:9090/api/v1/query?query=up%7Bjob%3D%22homelab-app%22%7D'
          for i in $(seq 1 30); do
            curl -fsS "$q" | grep -q '"1"]' && break
            echo "waiting for scrape ($i/30)"; sleep 3
          done
          curl -fsS "$q" | grep -q '"1"]'

      - name: Grafana is healthy
        run: |
          for i in $(seq 1 30); do
            curl -fsS localhost:3001/api/health | grep -q '"database": *"ok"' && break
            echo "waiting for grafana ($i/30)"; sleep 2
          done
          curl -fsS localhost:3001/api/health | grep -q '"database": *"ok"'

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v
